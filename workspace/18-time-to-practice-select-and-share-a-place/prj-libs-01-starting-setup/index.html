<!--
  LESSON 225 — STARTING STATE.

  This is the empty scaffold described at the beginning of the lesson.
  The <body> is intentionally empty. The instructor adds the map div,
  paragraph, and form during lesson 225 — the resulting file is
  reflected in prj-libs-02-basic-form-and-markup/index.html.

  The script src points at dist/bundle.js because Webpack will emit
  a single bundled file from src/app.ts (configured in webpack.config.js).
  The "defer" attribute ensures the bundle runs after the DOM is parsed,
  so form and input lookups in app.ts will always succeed.
-->

  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Understanding TypeScript</title>
  <script src="dist/bundle.js" defer></script>
</head>
